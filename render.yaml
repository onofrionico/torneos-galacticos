databases:
  - name: torneos-galacticos-db
    databaseName: torneos_galacticos
    user: torneos_user
    plan: basic-256mb

services:
  - type: web
    name: torneos-galacticos
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: torneos-galacticos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOADS_DIR
        value: /opt/render/project/src/public/uploads
      - key: MAX_FILE_SIZE_MB
        value: 100